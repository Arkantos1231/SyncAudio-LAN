<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SyncAudio LAN</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: #0f1117;
        color: #e2e8f0;
        padding: 20px;
        min-height: 100vh;
        user-select: none;
      }

      h1 {
        font-size: 1.4rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        color: #f8fafc;
      }

      .card {
        background: #1a1f2e;
        border: 1px solid #2d3748;
        border-radius: 10px;
        padding: 18px 20px;
        margin-bottom: 14px;
      }

      .header-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .status-badge {
        display: flex;
        align-items: center;
        gap: 7px;
        font-size: 0.82rem;
        color: #94a3b8;
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #4b5563;
        transition: background 0.3s;
        flex-shrink: 0;
      }
      .dot.idle       { background: #4b5563; }
      .dot.connecting { background: #f59e0b; animation: pulse 1.2s infinite; }
      .dot.connected  { background: #22c55e; }
      .dot.error      { background: #ef4444; }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.4; }
      }

      label {
        display: block;
        font-size: 0.78rem;
        font-weight: 600;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 6px;
      }

      .field { margin-bottom: 16px; }
      .field:last-child { margin-bottom: 0; }

      select, input[type="text"] {
        width: 100%;
        padding: 9px 12px;
        background: #0f1117;
        border: 1px solid #2d3748;
        border-radius: 6px;
        color: #e2e8f0;
        font-size: 0.9rem;
        outline: none;
        transition: border-color 0.2s;
      }
      select:focus, input[type="text"]:focus {
        border-color: #60a5fa;
      }
      select option { background: #1a1f2e; }

      .slider-row {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      input[type="range"] {
        flex: 1;
        appearance: none;
        height: 4px;
        background: #2d3748;
        border-radius: 2px;
        outline: none;
        cursor: pointer;
      }
      input[type="range"]::-webkit-slider-thumb {
        appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #60a5fa;
        cursor: pointer;
      }

      .slider-value {
        font-size: 0.85rem;
        color: #60a5fa;
        font-weight: 600;
        min-width: 52px;
        text-align: right;
      }

      .checkbox-row {
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
      }
      .checkbox-row input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: #60a5fa;
        cursor: pointer;
      }
      .checkbox-row span {
        font-size: 0.88rem;
        color: #cbd5e1;
      }

      .btn-row {
        display: flex;
        gap: 10px;
      }

      button {
        flex: 1;
        padding: 10px 18px;
        border: none;
        border-radius: 7px;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s, transform 0.1s;
      }
      button:active { transform: scale(0.97); }
      button:disabled { opacity: 0.35; cursor: not-allowed; }

      #connect-btn {
        background: #3b82f6;
        color: #fff;
      }
      #connect-btn:hover:not(:disabled) { background: #2563eb; }

      #disconnect-btn {
        background: #374151;
        color: #e2e8f0;
      }
      #disconnect-btn:hover:not(:disabled) { background: #4b5563; }

      .info-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.82rem;
      }
      .info-label { color: #64748b; }
      .info-value { color: #94a3b8; font-family: monospace; }

      #error-box {
        display: none;
        background: #1c1a1a;
        border: 1px solid #7f1d1d;
        border-radius: 7px;
        padding: 12px 14px;
        font-size: 0.82rem;
        color: #fca5a5;
        margin-bottom: 14px;
      }

      .ip-hint {
        font-size: 0.76rem;
        color: #4b5563;
        margin-top: 5px;
      }

      #role-hint {
        font-size: 0.76rem;
        color: #4b5563;
        margin-top: 5px;
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <div class="card">
      <div class="header-row">
        <h1>SyncAudio LAN</h1>
        <div class="status-badge">
          <div class="dot idle" id="status-dot"></div>
          <span id="status-text">Desconectado</span>
        </div>
      </div>
    </div>

    <!-- Error box -->
    <div id="error-box"></div>

    <!-- Mode & connection -->
    <div class="card">
      <div class="field">
        <label>Modo</label>
        <select id="role-select">
          <option value="sender">Sender — captura y transmite audio</option>
          <option value="receiver">Receiver — recibe y reproduce audio</option>
        </select>
        <p id="role-hint"></p>
      </div>

      <div class="field" id="ip-field">
        <label>IP del Receptor</label>
        <input type="text" id="ip-input" placeholder="192.168.1.100" autocomplete="off" spellcheck="false" />
        <p class="ip-hint">Tu IP local: <span id="local-ip">…</span></p>
      </div>

      <div class="field">
        <label>Búfer de red: <span id="buffer-label">20</span> ms</label>
        <div class="slider-row">
          <input type="range" id="buffer-slider" min="15" max="40" value="20" step="1" />
          <span class="slider-value"><span id="buffer-value">20</span> ms</span>
        </div>
      </div>

      <div class="field">
        <label class="checkbox-row">
          <input type="checkbox" id="auto-connect-check" />
          <span>Conectar automáticamente al iniciar Windows</span>
        </label>
      </div>
    </div>

    <!-- Actions -->
    <div class="card">
      <div class="btn-row">
        <button id="connect-btn">Conectar</button>
        <button id="disconnect-btn" disabled>Desconectar</button>
      </div>
    </div>

    <!-- Info -->
    <div class="card">
      <div class="info-row">
        <span class="info-label">Puerto UDP</span>
        <span class="info-value">44444</span>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
